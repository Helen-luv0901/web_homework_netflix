<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix | 影片隨機抽取</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">
    <div class="overlay"></div>

    <div class="main-wrapper">
        <div class="logo">NETFLIX</div>
        
        <div class="status-header">
            <p id="status-text" class="top-status">⚠️ 正在嘗試重新連接伺服器...</p>
            <div class="netflix-spinner-status"></div>
            <p class="hint-text">先在下方抽取等等想看什麼吧！</p>
        </div>

        <div class="player-card">
            <div id="display-zone">
                <img id="main-poster" src="images/99.jpg" alt="poster">
                <div id="video-container" class="hidden">
                    <video id="preview-video" width="100%" height="100%" muted playsinline></video>
                    <button id="mute-btn" onclick="toggleMute()">
                        <span id="mute-icon">🔇</span>
                    </button>
                </div>
            </div>

            <div class="info-zone">
                <button id="spin-btn" onclick="startSpin()">隨機抽取片段</button>
            </div>
        </div>

        <p class="refresh-link" onclick="location.reload()">手動重整頁面</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
